<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Model Context Protocol principle visualization</title>
<style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #canvas {
            width: 100%;
            height: 100%;
            position: fixed;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px;
            border-radius: 5px;
            max-width: 400px;
            font-size: 16px;
        }
        #controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px;
            border-radius: 5px;
        }
        .step-btn {
            margin: 5px;
            padding: 8px 12px;
            cursor: pointer;
        }
        .step-btn#prev-btn{
            display: inline-block;
        }
        .label {
            color: #ffffff;
            font-family: Arial, sans-serif;
            padding: 5px;
            background: rgba(0,0,0,0.6);
            border-radius: 3px;
            font-size: 16px;
            pointer-events: none;
        }
        #copyright {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-family: Arial, sans-serif;
            z-index: 1000;
            pointer-events: none;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        #copyright a {
            pointer-events: auto;
        }
        #step-title {
            position: fixed;
            top: 20px;
            left: 20px;
            width: auto;
            max-width: 60%;
            text-align: left;
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            z-index: 1000;
            pointer-events: none;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 5px;
        }

        /* Progress bar container style */
        #progress-container {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 10px;
            display: none; /* Hidden by default */
            z-index: 1000;
        }

        /* Progress bar style */
        #progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(50, 50, 50, 0.8);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        /* progress bar fill */
        #progress-fill {
            height: 100%;
            background: linear-gradient(to right, #3498db, #2ecc71);
            width: 0%;
            border-radius: 10px;
            transition: width 0.3s;
        }

        /* Progress bar slider */
        #progress-handle {
            position: absolute;
            top: 50%;
            left: 0%;
            transform: translate(-50%, -50%);
            width: 24px;
            height: 24px;
            background: #ffffff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            z-index: 1001;
        }

        /* Step mark style */
        .step-marker {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
        }

        /* Playback controls */
        #playback-controls {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        #playback-controls button {
            margin: 0 5px;
            padding: 5px 15px;
            background: rgba(50, 50, 50, 0.8);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #playback-controls button:hover {
            background: rgba(70, 70, 70, 0.8);
        }

        .label {
            transition: opacity 0.3s ease, transform 0.2s ease;
        }

        .label:hover {
            opacity: 1 !important;
            transform: scale(1.1);
            z-index: 1000;
        }
    </style>
</head>
<body>
<div id="canvas"></div>
<div id="info">
<h2>How Model Context Protocol works</h2>
<p id="step-description">Welcome to MCP model visualization! Click the "Start" button to start the demonstration.</p>
</div>
<div id="controls">
<button class="step-btn" id="start-btn">start</button>
<button class="step-btn" disabled="" id="prev-btn">Previous step</button>
<button class="step-btn" disabled="" id="next-btn">Next step</button>

</div>
<div id="step-title"></div>
 Copyright information

 progress bar container
<div id="progress-container">
<div id="progress-bar">
<div id="progress-fill"></div>

<button id="play-btn">play</button>

 Import the local Three.js file
<script src="js/three.min.js"></script>
<script src="js/OrbitControls.js"></script>
<script src="js/CSS2DRenderer.js"></script>
<script>
        // Three.js initialization and scene setup
        let scene, camera, renderer, labelRenderer, controls;
        let currentStep = 0;
        const steps = [];
        const objects = [];
        const labels = [];
        const connections = [];
        let serverEntities = [];
        let functionEntities = [];
        let currentStepLabels = [];
        let allLabels = [];
        let currentAnimationStep = 0; // Stores the current animation step index

        // Entity color and shape definition
        const entityColors = {
            host: 0x3498db,      // Blue - Host application
            client: 0xe74c3c,    // Red - Client
            server: 0xf39c12,    // Orange - Server
            localData: 0x2ecc71, // Green - local data
            remote: 0x9b59b6,    // Purple - Remote Service
            llm: 0x1abc9c,       // Cyan - LLM model
            mcp: 0xffffff        // White - MCP Core
        };

        // shape type constant
        const SHAPE_TYPES = {
            HOST: 'host',
            CLIENT: 'client',
            SERVER: 'server',
            DATA: 'data',
            REMOTE: 'remote',
            LLM: 'llm',
            MCP: 'mcp'
        };

        // Step description
        const stepDescriptions = [
            "Step 1: Get to know MCP - Model Context Protocol is a standard protocol for connecting AI models, data and tools.",
            "Step 2: MCP architecture - MCP consists of three main components: Host, Client and Server.",
            "Step 3: Host application - such as Claude Desktop, IDE and other programs that need to access MCP data.",
            "Step 4: Client component - protocol client that maintains a one-to-one connection with the Server.",
            "Step 5: Server component - a lightweight program that exposes specific functionality through the MCP standard protocol.",
            "Step 6: Data Connection - MCP Server provides secure access to local data sources and remote services.",
            "Step 7: Actual workflow - Host sends a request, connects to Server through Client, and obtains data for LLM to use."
        ];

        // Initialize the Three.js scene
        function init() {
            // Create a scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x121212);

            // Create camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 20;

            // Create renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas').appendChild(renderer.domElement);

            // Create a CSS2D renderer for tags
            labelRenderer = new THREE.CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';
            document.getElementById('canvas').appendChild(labelRenderer.domElement);

            // Add control
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.1;

            // Add light source
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(1, 1, 1);
            scene.add(directionalLight);

            // Window resizing
            window.addEventListener('resize', onWindowResize, false);

            // Set button event
            document.getElementById('start-btn').addEventListener('click', startDemo);
            document.getElementById('prev-btn').addEventListener('click', prevStep);
            document.getElementById('next-btn').addEventListener('click', nextStep);
            document.getElementById('reset-btn').addEventListener('click', resetDemo);

            // Create animation steps
            createSteps();

            // Start rendering loop
            animate();

            // Initialize progress bar drag function
            setupProgressDrag();

            // Initialize playback control function
            setupPlaybackControls();
        }

        // Add an animation function for moving objects
        function moveObject(obj, targetPosition, duration = 1000, callback) {
            const startPosition = obj.position.clone();
            const startTime = Date.now();

            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);

                // Use easing functions to make animations more natural
                const easeProgress = easeInOutQuad(progress);

                // Calculate current position
                obj.position.lerpVectors(startPosition, targetPosition, easeProgress);

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else if (callback) {
                    callback();
                }
            }

            animate();
        }

        // Create all animation steps
        function createSteps() {
            // Step 1: MCP Introduction
            steps.push(() => {
                clearScene();
                // Hide progress bar
                document.getElementById('progress-container').style.display = 'none';
                showMCPIntroduction();
                updateDescription(0);
                document.getElementById('step-title').textContent = "Introduction to MCP";
            });

            // Step 2: MCP Architecture
            steps.push(() => {
                // Save the entities from the first step for later checking whether there are duplicate elements
                const firstStepObjects = [...objects];
                const firstStepConnections = [...connections];
                const firstStepLabels = [...labels];

                // Do not clear the scene immediately, first find the elements that need to be retained
                // Document the elements that need to be retained and their target locations
                const elementsToPreserve = [];

                // Check the relevant elements from the first step and mark the ones that need to be kept
                for (let obj of firstStepObjects) {
                    // Continue checking only if there are child elements (tags) in the object
                    if (obj.children && obj.children.length > 0 && obj.children[0] instanceof THREE.CSS2DObject) {
                        const label = obj.children[0];
                        const labelText = label.element.textContent;

                        // Determine whether it is an element that needs to be retained based on the label text
                        if (labelText === "app" || labelText.includes("Host")) {
                            elementsToPreserve.push({
                                obj: obj,
                                label: label,
                                targetPosition: new THREE.Vector3(-6, 2, 0),
                                newLabelText: "Host"
                            });
                        } else if (labelText.includes("Client")) {
                            elementsToPreserve.push({
                                obj: obj,
                                label: label,
                                targetPosition: new THREE.Vector3(-3, 0, 0),
                                newLabelText: "Client"
                            });
                        } else if (labelText === "API service" || labelText.includes("Server")) {
                            elementsToPreserve.push({
                                obj: obj,
                                label: label,
                                targetPosition: new THREE.Vector3(0, -2, 0),
                                newLabelText: "Server"
                            });
                        } else if (labelText === "data source" || labelText.includes("local data")) {
                            elementsToPreserve.push({
                                obj: obj,
                                label: label,
                                targetPosition: new THREE.Vector3(3, -3, 0),
                                newLabelText: "local data"
                            });
                        } else if (labelText === "external tools" || labelText.includes("remote service")) {
                            elementsToPreserve.push({
                                obj: obj,
                                label: label,
                                targetPosition: new THREE.Vector3(6, -1, 0),
                                newLabelText: "remote service"
                            });
                        }
                    }
                }

                // Clear non-retained elements
                clearScene();
                // Hide progress bar
                document.getElementById('progress-container').style.display = 'none';

                // Re-add the retained elements to the scene (they are still in their original position)
                const preservedObjects = {
                    host: null,
                    client: null,
                    server: null,
                    data: null,
                    remote: null
                };

                // Start animation to move retained elements to new positions
                let animationsCompleted = 0;
                const totalAnimations = elementsToPreserve.length;

                elementsToPreserve.forEach(item => {
                    scene.add(item.obj);
                    objects.push(item.obj);

                    // Start animation
                    moveObject(item.obj, item.targetPosition, 1000, () => {
                        // Update label text when animation completes
                        item.label.element.textContent = item.newLabelText;

                        // record this object
                        if (item.newLabelText === "Host") preservedObjects.host = item.obj;
                        else if (item.newLabelText === "Client") preservedObjects.client = item.obj;
                        else if (item.newLabelText === "Server") preservedObjects.server = item.obj;
                        else if (item.newLabelText === "local data") preservedObjects.data = item.obj;
                        else if (item.newLabelText === "remote service") preservedObjects.remote = item.obj;

                        // Check if all animations are completed
                        animationsCompleted++;
                        if (animationsCompleted === totalAnimations) {
                            // After all animations are complete, add the entities created without retention
                            finishSceneSetup();
                        }
                    });
                });

                // If there are no elements that require animation, complete the scene settings directly.
                if (elementsToPreserve.length === 0) {
                    finishSceneSetup();
                }

                function finishSceneSetup() {
                    // Supplementary creation of entities without reservation
                    if (!preservedObjects.host) {
                        preservedObjects.host = createEntity(SHAPE_TYPES.HOST, "Host", -6, 2, 0);
                    }
                    if (!preservedObjects.client) {
                        preservedObjects.client = createEntity(SHAPE_TYPES.CLIENT, "Client", -3, 0, 0);
                    }
                    if (!preservedObjects.server) {
                        preservedObjects.server = createEntity(SHAPE_TYPES.SERVER, "Server", 0, -2, 0);
                    }
                    if (!preservedObjects.data) {
                        preservedObjects.data = createEntity(SHAPE_TYPES.DATA, "local data", 3, -3, 0);
                    }
                    if (!preservedObjects.remote) {
                        preservedObjects.remote = createEntity(SHAPE_TYPES.REMOTE, "remote service", 6, -1, 0);
                    }

                    // Add connection line
                    if (preservedObjects.host && preservedObjects.client)
                        createConnection(preservedObjects.host, preservedObjects.client);
                    if (preservedObjects.client && preservedObjects.server)
                        createConnection(preservedObjects.client, preservedObjects.server);
                    if (preservedObjects.server && preservedObjects.data)
                        createConnection(preservedObjects.server, preservedObjects.data);
                    if (preservedObjects.server && preservedObjects.remote)
                        createConnection(preservedObjects.server, preservedObjects.remote);

                    // Add MCP tag
                    const mcpLabel = createTextLabel("Model Context Protocol", 0, 3, 0);
                    // Add descriptive tags
                    addFloatingLabel("Standardized connection", -4.5, 1, 0);
                    addFloatingLabel("data access", 1.5, -2.5, 0);
                }

                updateDescription(1);
                document.getElementById('step-title').textContent = "MCP architecture";
            });

            // Step 3: Host application
            steps.push(() => {
                // Save the entities in the second step for subsequent checks to see if there are duplicate elements
                const prevStepObjects = [...objects];
                const prevStepConnections = [...connections];
                const prevStepLabels = [...labels];

                // Define the center Y coordinate
                const centerY = 0;

                // Document the elements that need to be retained and their target locations
                const elementsToPreserve = [];

                // Check the relevant elements from the previous step and mark the ones you need to keep
                for (let obj of prevStepObjects) {
                    // Continue checking only if there are child elements (tags) in the object
                    if (obj.children && obj.children.length > 0 && obj.children[0] instanceof THREE.CSS2DObject) {
                        const label = obj.children[0];
                        const labelText = label.element.textContent;

                        // Determine whether it is an element that needs to be retained based on the label text
                        if (labelText === "Host") {
                            elementsToPreserve.push({
                                obj: obj,
                                label: label,
                                targetPosition: new THREE.Vector3(0, centerY, 0),
                                newLabelText: "Host",
                                scale: 1.6
                            });
                        }
                    }
                }

                // Clear non-retained elements
                clearScene();
                // Hide progress bar
                document.getElementById('progress-container').style.display = 'none';

                // Re-add retained elements to the scene
                const preservedObjects = {
                    host: null
                };

                // Start animation to move retained elements to new positions
                let animationsCompleted = 0;
                const totalAnimations = elementsToPreserve.length;

                elementsToPreserve.forEach(item => {
                    scene.add(item.obj);
                    objects.push(item.obj);

                    // If scaling is required, adjust the scaling of the object
                    if (item.scale) {
                        // Smooth zoom animation
                        const startScale = item.obj.scale.clone();
                        const targetScale = startScale.clone().multiplyScalar(item.scale / startScale.x);
                        animateScale(item.obj, targetScale, 1000);
                    }

                    // Start animation
                    moveObject(item.obj, item.targetPosition, 1000, () => {
                        // Update label text when animation completes
                        if (item.newLabelText) {
                            item.label.element.textContent = item.newLabelText;
                        }

                        // record this object
                        if (item.newLabelText === "Host") preservedObjects.host = item.obj;

                        // Check if all animations are completed
                        animationsCompleted++;
                        if (animationsCompleted === totalAnimations) {
                            // After all animations are complete, add the entities created without retention
                            completeHostScene(preservedObjects);
                        }
                    });
                });

                // If there are no elements that require animation, complete the scene settings directly.
                if (elementsToPreserve.length === 0) {
                    completeHostScene(preservedObjects);
                }

                // Complete Host application scenario settings
                function completeHostScene(preservedObjects) {
                    // Create the central Host component if it does not exist
                    const host = preservedObjects.host || createEntity(SHAPE_TYPES.HOST, "Host", 0, centerY, 0, 1.6);

                    // Create various Host types
                    const claude = createEntity(SHAPE_TYPES.HOST, "Claude Desktop", -5, centerY + 3, 0, 1.2);
                    const ide = createEntity(SHAPE_TYPES.HOST, "IDE", -5, centerY, 0, 1.2);
                    const aiTool = createEntity(SHAPE_TYPES.HOST, "AI tools", -5, centerY - 3, 0, 1.2);

                    // Connect to central host
                    createConnection(claude, host);
                    createConnection(ide, host);
                    createConnection(aiTool, host);

                    // Add MCP Client connection
                    const client = createEntity(SHAPE_TYPES.CLIENT, "MCP Client", 5, centerY, 0);
                    createConnection(host, client, entityColors.host);
                }

                updateDescription(2);
                document.getElementById('step-title').textContent = "Host application";
            });

            // Step 4: Client component
            steps.push(() => {
                // Save the entity from the previous step
                const prevStepObjects = [...objects];
                const prevStepConnections = [...connections];
                const prevStepLabels = [...labels];

                // Document the elements that need to be retained and their target locations
                const elementsToPreserve = [];

                // Check the relevant elements from the previous step and mark the ones you need to keep
                for (let obj of prevStepObjects) {
                    // Continue checking only if there are child elements (tags) in the object
                    if (obj.children && obj.children.length > 0 && obj.children[0] instanceof THREE.CSS2DObject) {
                        const label = obj.children[0];
                        const labelText = label.element.textContent;

                        // Determine whether it is an element that needs to be retained based on the label text
                        if (labelText === "MCP Client") {
                            elementsToPreserve.push({
                                obj: obj,
                                label: label,
                                targetPosition: new THREE.Vector3(0, 0, 0),
                                newLabelText: "MCP Client",
                                scale: 1.6
                            });
                        }
                    }
                }

                // Clear non-retained elements
                clearScene();
                // Hide progress bar
                document.getElementById('progress-container').style.display = 'none';

                // Re-add retained elements to the scene
                const preservedObjects = {
                    client: null
                };

                // Start animation to move retained elements to new positions
                let animationsCompleted = 0;
                const totalAnimations = elementsToPreserve.length;

                elementsToPreserve.forEach(item => {
                    scene.add(item.obj);
                    objects.push(item.obj);

                    // If scaling is required, adjust the scaling of the object
                    if (item.scale) {
                        // Smooth zoom animation
                        const startScale = item.obj.scale.clone();
                        const targetScale = startScale.clone().multiplyScalar(item.scale / startScale.x);
                        animateScale(item.obj, targetScale, 1000);
                    }

                    // Start animation
                    moveObject(item.obj, item.targetPosition, 1000, () => {
                        // Update label text when animation completes
                        if (item.newLabelText) {
                            item.label.element.textContent = item.newLabelText;
                        }

                        // record this object
                        if (item.newLabelText === "MCP Client") preservedObjects.client = item.obj;

                        // Check if all animations are completed
                        animationsCompleted++;
                        if (animationsCompleted === totalAnimations) {
                            // After all animations are complete, add the entities created without retention
                            completeClientScene(preservedObjects);
                        }
                    });
                });

                // If there are no elements that require animation, complete the scene settings directly.
                if (elementsToPreserve.length === 0) {
                    completeClientScene(preservedObjects);
                }

                // Complete the Client component scene settings
                function completeClientScene(preservedObjects) {
                    // Create the Client component if it does not exist
                    const client = preservedObjects.client || createEntity(SHAPE_TYPES.CLIENT, "MCP Client", 0, 0, 0, 1.6);

                    // Create multiple Server connections
                    const fileServer = createEntity(SHAPE_TYPES.SERVER, "file server", 5, 3, 0);
                    const dbServer = createEntity(SHAPE_TYPES.SERVER, "database server", 5, 0, 0);
                    const apiServer = createEntity(SHAPE_TYPES.SERVER, "API server", 5, -3, 0);

                    // Create Host
                    const host = createEntity(SHAPE_TYPES.HOST, "Host", -5, 0, 0);

                    // Add connection line
                    createConnection(host, client);
                    createConnection(client, fileServer);
                    createConnection(client, dbServer);
                    createConnection(client, apiServer);
                }

                updateDescription(3);
                document.getElementById('step-title').textContent = "Client component";
            });

            // Step 5: Server Components
            steps.push(() => {
                // Save the entity from the previous step
                const prevStepObjects = [...objects];
                const prevStepConnections = [...connections];
                const prevStepLabels = [...labels];

                // Document the elements that need to be retained and their target locations
                const elementsToPreserve = [];

                // Check the relevant elements from the previous step and mark the ones you need to keep
                for (let obj of prevStepObjects) {
                    // Continue checking only if there are child elements (tags) in the object
                    if (obj.children && obj.children.length > 0 && obj.children[0] instanceof THREE.CSS2DObject) {
                        const label = obj.children[0];
                        const labelText = label.element.textContent;

                        // Determine whether it is an element that needs to be retained based on the label text
                        if (labelText.includes("server") || labelText.includes("Server")) {
                            elementsToPreserve.push({
                                obj: obj,
                                label: label,
                                targetPosition: new THREE.Vector3(0, 0, 0),
                                newLabelText: "MCP Server",
                                scale: 1.6
                            });
                            break; // Only keep the first found Server
                        }
                    }
                }

                // Clear non-retained elements
                clearScene();
                // Hide progress bar
                document.getElementById('progress-container').style.display = 'none';

                // Re-add retained elements to the scene
                const preservedObjects = {
                    server: null
                };

                // Start animation to move retained elements to new positions
                let animationsCompleted = 0;
                const totalAnimations = elementsToPreserve.length;

                elementsToPreserve.forEach(item => {
                    scene.add(item.obj);
                    objects.push(item.obj);

                    // If scaling is required, adjust the scaling of the object
                    if (item.scale) {
                        // Smooth zoom animation
                        const startScale = item.obj.scale.clone();
                        const targetScale = startScale.clone().multiplyScalar(item.scale / startScale.x);
                        animateScale(item.obj, targetScale, 1000);
                    }

                    // Start animation
                    moveObject(item.obj, item.targetPosition, 1000, () => {
                        // Update label text when animation completes
                        if (item.newLabelText) {
                            item.label.element.textContent = item.newLabelText;
                        }

                        // record this object
                        if (item.newLabelText === "MCP Server") preservedObjects.server = item.obj;

                        // Check if all animations are completed
                        animationsCompleted++;
                        if (animationsCompleted === totalAnimations) {
                            // After all animations are complete, add the entities created without retention
                            completeServerScene(preservedObjects);
                        }
                    });
                });

                // If there are no elements that require animation, complete the scene settings directly.
                if (elementsToPreserve.length === 0) {
                    completeServerScene(preservedObjects);
                }

                // Complete the Server component scene settings
                function completeServerScene(preservedObjects) {
                    // Create the Server component if it does not exist
                    const server = preservedObjects.server || createEntity(SHAPE_TYPES.SERVER, "MCP Server", 0, 0, 0, 1.6);

                    // Create data source
                    const file = createEntity(SHAPE_TYPES.DATA, "file system", 4, 2, 0);
                    const db = createEntity(SHAPE_TYPES.DATA, "local database", 4, -2, 0);

                    // Create remote service
                    const api = createEntity(SHAPE_TYPES.REMOTE, "External API", -4, 2, 0);
                    const service = createEntity(SHAPE_TYPES.REMOTE, "cloud service", -4, -2, 0);

                    // Add connection line
                    createConnection(server, file);
                    createConnection(server, db);
                    createConnection(server, api);
                    createConnection(server, service);

                    // Add service function label
                    addFloatingLabel("Expose standardized capabilities", 0, 3, 0);
                    addFloatingLabel("Handle data security and permissions", 0, -3, 0);
                }

                updateDescription(4);
                document.getElementById('step-title').textContent = "Server component";
            });

            // Step 6: Data connection
            steps.push(() => {
                // Save the entity from the previous step
                const prevStepObjects = [...objects];
                const prevStepConnections = [...connections];
                const prevStepLabels = [...labels];

                // Document the elements that need to be retained and their target locations
                const elementsToPreserve = [];

                // Check the relevant elements from the previous step and mark the ones you need to keep
                for (let obj of prevStepObjects) {
                    // Continue checking only if there are child elements (tags) in the object
                    if (obj.children && obj.children.length > 0 && obj.children[0] instanceof THREE.CSS2DObject) {
                        const label = obj.children[0];
                        const labelText = label.element.textContent;

                        // Determine whether it is an element that needs to be retained based on the label text
                        if (labelText === "MCP Server") {
                            elementsToPreserve.push({
                                obj: obj,
                                label: label,
                                targetPosition: new THREE.Vector3(0, -2, 0),
                                newLabelText: "MCP Server"
                            });
                        } else if (labelText === "file system" || labelText.includes("local data")) {
                            elementsToPreserve.push({
                                obj: obj,
                                label: label,
                                targetPosition: new THREE.Vector3(-4, 2, 0),
                                newLabelText: "local data source",
                                scale: 1.3
                            });
                        } else if (labelText === "External API" || labelText.includes("remote service")) {
                            elementsToPreserve.push({
                                obj: obj,
                                label: label,
                                targetPosition: new THREE.Vector3(4, 2, 0),
                                newLabelText: "remote service",
                                scale: 1.3
                            });
                        }
                    }
                }

                // Clear non-retained elements
                clearScene();
                // Hide progress bar
                document.getElementById('progress-container').style.display = 'none';

                // Re-add retained elements to the scene
                const preservedObjects = {
                    server: null,
                    localData: null,
                    remote: null
                };

                // Start animation to move retained elements to new positions
                let animationsCompleted = 0;
                const totalAnimations = elementsToPreserve.length;

                elementsToPreserve.forEach(item => {
                    scene.add(item.obj);
                    objects.push(item.obj);

                    // If scaling is required, adjust the scaling of the object
                    if (item.scale) {
                        // Smooth zoom animation
                        const startScale = item.obj.scale.clone();
                        const targetScale = startScale.clone().multiplyScalar(item.scale / startScale.x);
                        animateScale(item.obj, targetScale, 1000);
                    }

                    // Start animation
                    moveObject(item.obj, item.targetPosition, 1000, () => {
                        // Update label text when animation completes
                        if (item.newLabelText) {
                            item.label.element.textContent = item.newLabelText;
                        }

                        // record this object
                        if (item.newLabelText === "MCP Server") preservedObjects.server = item.obj;
                        else if (item.newLabelText === "local data source") preservedObjects.localData = item.obj;
                        else if (item.newLabelText === "remote service") preservedObjects.remote = item.obj;

                        // Check if all animations are completed
                        animationsCompleted++;
                        if (animationsCompleted === totalAnimations) {
                            // After all animations are complete, add the entities created without retention
                            completeDataConnectionsScene(preservedObjects);
                        }
                    });
                });

                // If there are no elements that require animation, complete the scene settings directly.
                if (elementsToPreserve.length === 0) {
                    completeDataConnectionsScene(preservedObjects);
                }

                // Complete data connection scenario settings
                function completeDataConnectionsScene(preservedObjects) {
                    // Create local data if it does not exist
                    const localData = preservedObjects.localData || createEntity(SHAPE_TYPES.DATA, "local data source", -4, 2, 0, 1.3);

                    // Create subkey
                    const files = createEntity(SHAPE_TYPES.DATA, "document", -6, 4, 0, 0.7);
                    const db = createEntity(SHAPE_TYPES.DATA, "database", -8, 2, 0, 0.7);
                    const service = createEntity(SHAPE_TYPES.DATA, "local service", -6, 0, 0, 0.7);

                    // Connect to local data
                    createConnection(localData, files);
                    createConnection(localData, db);
                    createConnection(localData, service);

                    // Create the remote service if it does not exist
                    const remote = preservedObjects.remote || createEntity(SHAPE_TYPES.REMOTE, "remote service", 4, 2, 0, 1.3);

                    // Create subkey
                    const api = createEntity(SHAPE_TYPES.REMOTE, "API", 6, 4, 0, 0.7);
                    const cloud = createEntity(SHAPE_TYPES.REMOTE, "cloud service", 8, 2, 0, 0.7);
                    const saas = createEntity(SHAPE_TYPES.REMOTE, "SaaS", 6, 0, 0, 0.7);

                    // Connect to remote service
                    createConnection(remote, api);
                    createConnection(remote, cloud);
                    createConnection(remote, saas);

                    // Create MCP Server if it does not exist
                    const server = preservedObjects.server || createEntity(SHAPE_TYPES.SERVER, "MCP Server", 0, -2, 0);

                    // Connect Server to data source
                    createConnection(server, localData);
                    createConnection(server, remote);

                    // Add security label
                    addFloatingLabel("secure access", -2, 0, 0);
                    addFloatingLabel("Connect via API", 2, 0, 0);
                }

                updateDescription(5);
                document.getElementById('step-title').textContent = "data connection";
            });

            // Step 7: Complete Workflow
            steps.push(() => {
                clearScene();
                // Show progress bar - only shown in step 7
                document.getElementById('progress-container').style.display = 'block';
                showCompleteWorkflow();
                updateDescription(6);
                document.getElementById('step-title').textContent = "Complete MCP workflow";
            });
        }

        // Create a unified shape for a specific entity
        function createEntity(type, name, x, y, z, scale = 0.8) {
            let mesh;
            const yOffset = 1.2 * scale; // Label offset is adjusted proportionally

            switch(type) {
                case SHAPE_TYPES.MCP:
                    // MCP core - using octahedron
                    const mcpGeometry = new THREE.OctahedronGeometry(1 * scale, 0);
                    const mcpMaterial = new THREE.MeshPhongMaterial({
                        color: entityColors.mcp,
                        shininess: 100
                    });
                    mesh = new THREE.Mesh(mcpGeometry, mcpMaterial);
                    break;

                case SHAPE_TYPES.HOST:
                    // Host application - uses a cube with slightly rounded corners
                    const hostGeometry = new THREE.BoxGeometry(1.5 * scale, 1.5 * scale, 1.5 * scale);
                    const hostMaterial = new THREE.MeshPhongMaterial({
                        color: entityColors.host
                    });
                    mesh = new THREE.Mesh(hostGeometry, hostMaterial);
                    break;

                case SHAPE_TYPES.CLIENT:
                    // Client - using cylinder
                    const clientGeometry = new THREE.CylinderGeometry(
                        0.9 * scale, 0.9 * scale, 1.5 * scale, 8
                    );
                    const clientMaterial = new THREE.MeshPhongMaterial({
                        color: entityColors.client
                    });
                    mesh = new THREE.Mesh(clientGeometry, clientMaterial);
                    break;

                case SHAPE_TYPES.SERVER:
                    // Server - using hexagonal prisms
                    const serverGeometry = new THREE.CylinderGeometry(
                        1 * scale, 1 * scale, 1.5 * scale, 6
                    );
                    const serverMaterial = new THREE.MeshPhongMaterial({
                        color: entityColors.server
                    });
                    mesh = new THREE.Mesh(serverGeometry, serverMaterial);
                    break;

                case SHAPE_TYPES.DATA:
                    // Data - using tetrahedrons
                    const dataGeometry = new THREE.TetrahedronGeometry(1 * scale);
                    const dataMaterial = new THREE.MeshPhongMaterial({
                        color: entityColors.localData
                    });
                    mesh = new THREE.Mesh(dataGeometry, dataMaterial);
                    break;

                case SHAPE_TYPES.REMOTE:
                    // Remote Service - Using Sphere
                    const remoteGeometry = new THREE.SphereGeometry(1 * scale, 16, 16);
                    const remoteMaterial = new THREE.MeshPhongMaterial({
                        color: entityColors.remote
                    });
                    mesh = new THREE.Mesh(remoteGeometry, remoteMaterial);
                    break;

                case SHAPE_TYPES.LLM:
                    // LLM model - using dodecahedron
                    const llmGeometry = new THREE.DodecahedronGeometry(1.2 * scale);
                    const llmMaterial = new THREE.MeshPhongMaterial({
                        color: entityColors.llm,
                        shininess: 80
                    });
                    mesh = new THREE.Mesh(llmGeometry, llmMaterial);
                    break;

                default:
                    // Default is block
                    const defaultGeometry = new THREE.BoxGeometry(1 * scale, 1 * scale, 1 * scale);
                    const defaultMaterial = new THREE.MeshPhongMaterial({ color: 0xcccccc });
                    mesh = new THREE.Mesh(defaultGeometry, defaultMaterial);
            }

            mesh.position.set(x, y, z);
            scene.add(mesh);
            objects.push(mesh);

            // Add tag
            addTextLabel(mesh, name, yOffset);

            return mesh;
        }

        // Complete workflow
        function showCompleteWorkflow() {
            // Whether the marker is currently animated
            let isAnimating = true;
            let animationPaused = false;  // Make sure the animation is not paused by default
            // Reset global currentAnimationStep
            currentAnimationStep = 0;
            let animationTimeouts = [];

            // Add workflow labels
            addFloatingLabel("Complete MCP workflow", 0, -17, 0);

            // Create all entities but initially set transparency to 0
            const llm = createEntity(SHAPE_TYPES.LLM, "LLM", 0, 6, 0, 0.6);

            const functionEntity = createEntity(SHAPE_TYPES.REMOTE, "Utility function", -4, -5, 0, 0.4);

                entity.material.opacity = 0;

                if (entity.children.length > 0) {
                    entity.children[0].visible = false;
                }
            });

            // Store local connections and labels for animation control
            const localConnections = [];
            const flowTexts = [];
            const dataBalls = [];

            // Define animation steps
            const animationSteps = [
                // Step 1: Display the Host application
                () => {
                    document.getElementById('step-title').textContent = "(1) Display Host application";
                    fadeInObject(host, 500, () => {

                    moveObject(server, new THREE.Vector3(0, -3, 0), 500);

                console.log("=== Animation step IDs of all current tags ===");

                // Execute from the beginning to the specified steps

                }

            // Reset scene state
            function resetSceneState() {
                // Reset animation step
                currentAnimationStep = 0;
                console.log("Reset scene state, current animation step:", currentAnimationStep);

                // Reset all visibility and transparency
                [llm, host, client, server, data, functionEntity].forEach(entity => {
                    if (entity) {
                        entity.material.opacity = 0;
                        if (entity.children.length > 0) {
                            entity.children[0].visible = false;
                        }
                    }
                });

                // Clear previous connections and labels
                localConnections.forEach(conn => {
                    if (conn && scene.children.includes(conn)) {
                        scene.remove(conn);
                    }
                });
                localConnections.length = 0;

                // clear data ball
                dataBalls.forEach(ball => {
                    if (ball && scene.children.includes(ball)) {
                        scene.remove(ball);
                    }
                });
                dataBalls.length = 0;

                // Clear loaded floating labels
                const floatingLabels = scene.children.filter(obj =>
                    obj instanceof THREE.CSS2DObject &&
                    !obj.parent // Select only CSS2DObject without parent (floating labels)
                );
                floatingLabels.forEach(label => {
                    if (label.element && label.element.textContent.match(/^\d+\./)) {
                        scene.remove(label);
                    }
                });
            }

            // Set up progress bars and interactions
            function setupProgressBar(totalSteps) {
                const progressContainer = document.getElementById('progress-container');
                const progressBar = document.getElementById('progress-bar');
                const progressFill = document.getElementById('progress-fill');
                const progressHandle = document.getElementById('progress-handle');
                const playBtn = document.getElementById('play-btn');
                const pauseBtn = document.getElementById('pause-btn');

                // Show progress bar
                progressContainer.style.display = 'block';

                // Add markers to each step
                for (let i = 0; i < totalSteps; i++) {
                    const marker = document.createElement('div');
                    marker.className = 'step-marker';
                    marker.style.left = `${(i / (totalSteps - 1)) * 100}%`;
                    progressBar.appendChild(marker);

                    // Disable click events
                    // marker.addEventListener('click', () => {
                    //     animationPaused = true;
                    //     pauseBtn.disabled = false;
                    //     playBtn.disabled = false;
                    //     jumpToStep(i);
                    // });
                }

                // Update progress bar status
                function updateProgressBar(step) {
                    const progress = (step / (totalSteps - 1)) * 100;
                    progressFill.style.width = `${progress}%`;
                    progressHandle.style.left = `${progress}%`;
                }

                // Add drag functionality
                let isDragging = false;

                progressHandle.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    animationPaused = true;
                    pauseBtn.disabled = true;
                    playBtn.disabled = false;
                    clearAllTimeouts();
                    e.preventDefault(); // Prevent text selection
                });

                document.addEventListener('mousemove', (e) => {
                    if (!isDragging) return;

                    // Calculate location percentage
                    const rect = progressBar.getBoundingClientRect();
                    let pos = (e.clientX - rect.left) / rect.width;
                    pos = Math.max(0, Math.min(1, pos)); // Limit to the range 0-1

                    // Update progress bar display
                    progressFill.style.width = `${pos * 100}%`;
                    progressHandle.style.left = `${pos * 100}%`;

                    // Calculate the corresponding steps
                    const stepIndex = Math.round(pos * (totalSteps - 1));

                    // Show current step name
                    document.getElementById('step-title').textContent =
                        `(${stepIndex + 1}) ${getStepName(stepIndex)}`;
                });

                document.addEventListener('mouseup', () => {
                    if (!isDragging) return;
                    isDragging = false;

                    // Calculate the steps corresponding to the current position
                    const progress = parseFloat(progressFill.style.width) / 100;
                    const stepIndex = Math.round(progress * (totalSteps - 1));

                    // Jump to this step
                    jumpToStep(stepIndex);
                });

                // Add touch support
                progressHandle.addEventListener('touchstart', (e) => {
                    isDragging = true;
                    animationPaused = true;
                    pauseBtn.disabled = true;
                    playBtn.disabled = false;
                    clearAllTimeouts();
                    e.preventDefault(); // Prevent scrolling
                });

                document.addEventListener('touchmove', (e) => {
                    if (!isDragging) return;

                    // Get touch location
                    const touch = e.touches[0];
                    const rect = progressBar.getBoundingClientRect();
                    let pos = (touch.clientX - rect.left) / rect.width;
                    pos = Math.max(0, Math.min(1, pos)); // Limit to the range 0-1

                    // Update progress bar display
                    progressFill.style.width = `${pos * 100}%`;
                    progressHandle.style.left = `${pos * 100}%`;

                    // Calculate the corresponding steps
                    const stepIndex = Math.round(pos * (totalSteps - 1));

                    // Show current step name
                    document.getElementById('step-title').textContent =
                        `(${stepIndex + 1}) ${getStepName(stepIndex)}`;

                    e.preventDefault(); // Prevent page from scrolling
                });

                document.addEventListener('touchend', () => {
                    if (!isDragging) return;
                    isDragging = false;

                    // Calculate the steps corresponding to the current position
                    const progress = parseFloat(progressFill.style.width) / 100;
                    const stepIndex = Math.round(progress * (totalSteps - 1));

                    // Jump to this step
                    jumpToStep(stepIndex);
                });

                // play/pause button
                playBtn.addEventListener('click', () => {
                    animationPaused = false;
                    if (currentAnimationStep < totalSteps) {
                        nextAnimationStep();
                    }
                    playBtn.disabled = true;
                    pauseBtn.disabled = false;
                });

                pauseBtn.addEventListener('click', () => {
                    animationPaused = true;
                    clearAllTimeouts();
                    playBtn.disabled = false;
                    pauseBtn.disabled = true;
                });

                // Initialization progress bar
                updateProgressBar(0);
            }

            // Update connecting lines in final steps
            function updateConnectionsForFinalStep(connectionLines) {
                // Existing connection lines are no longer deleted, instead they are retained
                // connectionLines.forEach(line => {
                //     scene.remove(line);
                // });
                // connectionLines.length = 0;

                // Check existing wiring to ensure all critical connections are present
                const host = objects.find(obj => obj.userData.type === 'host');
                const client = objects.find(obj => obj.userData.type === 'client');
                const server = objects.find(obj => obj.userData.type === 'server');
                const llm = objects.find(obj => obj.userData.type === 'llm');
                const data = objects.find(obj => obj.userData.type === 'data');
                const functionEntity = objects.find(obj => obj.userData.type === 'remote');

                // The connection is only created if all necessary objects are found
                if (host && client && server && llm && data && functionEntity) {
                    // Check if the necessary connection lines already exist, create them if they do not exist
                    const existingConnectionPairs = connectionLines.map(line => {
                        // Check the objects connected by this line and judge by position
                        const linePoints = line.geometry.attributes.position.array;
                        const startPoint = new THREE.Vector3(linePoints[0], linePoints[1], linePoints[2]);
                        const endPoint = new THREE.Vector3(linePoints[3], linePoints[4], linePoints[5]);

                        // Returns the connected object pair
                        return {
                            line: line,
                            start: findObjectByPosition(startPoint),
                            end: findObjectByPosition(endPoint)
                        };
                    });

                    // Check and create necessary connections
                    const requiredConnections = [
                        { start: host, end: client, color: 0x3498db },
                        { start: client, end: server, color: 0xe74c3c },
                        { start: client, end: llm, color: 0xe74c3c },
                        { start: server, end: functionEntity, color: 0xf39c12 },
                        { start: functionEntity, end: data, color: 0x9b59b6 }
                    ];

                    // For each necessary connection, check if it exists and create it if it does not exist
                    requiredConnections.forEach(conn => {
                        // Check whether the connection already exists
                        const exists = existingConnectionPairs.some(pair =>
                            (pair.start === conn.start && pair.end === conn.end) ||
                            (pair.start === conn.end && pair.end === conn.start)
                        );

                        // If it does not exist, create a new connection
                        if (!exists) {
                            const newConn = createConnection(conn.start, conn.end, conn.color);
                            connectionLines.push(newConn);
                        }
                    });
                }
            }

            // Helper function: find object by location
            function findObjectByPosition(position) {
                return objects.find(obj =>
                    obj.position.distanceTo(position) < 0.1
                );
            }

                    if (!isAnimating) {
                        clearScene();
                        showCompleteWorkflow();
                    }
                });
                document.getElementById('controls').appendChild(replayBtn);
            }

            // Disable next button until animation completes
            document.getElementById('next-btn').disabled = true;

            // Start the first animation step
            nextAnimationStep();
        }

        // Add particle effects system
        let particleGroups = [];

        // Create enhanced data ball and trajectory effects
        function createEnhancedDataBall(startPos, endPos, color) {
            // basic sphere
            const ballGeometry = new THREE.SphereGeometry(0.2, 12, 12); // Improve the subdivision of the sphere
            const ballMaterial = new THREE.MeshPhongMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.8,
                transparent: true,
                opacity: 0.9,
                shininess: 100
            });
            const ball = new THREE.Mesh(ballGeometry, ballMaterial);

            // Add a sphere to the scene
            ball.position.copy(startPos);
            scene.add(ball);
            objects.push(ball);

            // Glowing halo
            const glowSize = 0.35;
            const glowGeometry = new THREE.SphereGeometry(glowSize, 16, 16);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.4,
                side: THREE.BackSide,
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            ball.add(glow);

            // Particle System - Create a trail that follows a sphere
            const particleCount = 40;
            const particleGroup = new THREE.Group();
            scene.add(particleGroup);
            particleGroups.push(particleGroup);

            // Calculate direction vector
            const direction = new THREE.Vector3().subVectors(endPos, startPos).normalize();

            // Set animation
            const startTime = Date.now();
            const duration = 2000; // 2 seconds
            const particleLifespan = 800; // Particle lifetime (milliseconds)
            let particles = [];

            function animateBall() {
                const currentTime = Date.now();
                const elapsedTime = currentTime - startTime;
                const progress = Math.min(elapsedTime / duration, 1);

                // Use the easing function
                const easeProgress = easeInOutQuad(progress);

                // Calculate current position
                const currentPosition = new THREE.Vector3();
                currentPosition.lerpVectors(startPos, endPos, easeProgress);
                ball.position.copy(currentPosition);

                // Add new particles (1-2 particles added per frame)
                if (progress < 0.95) {
                    const particleCount = Math.random() > 0.5 ? 1 : 2;
                    for (let i = 0; i < particleCount; i++) {
                        createParticle(currentPosition, direction, currentTime, color);
                    }
                }

                // Update all particles
                updateParticles(currentTime);

                // If not completed, continue animation
                if (progress < 1) {
                    requestAnimationFrame(animateBall);
                } else {
                    // After the animation is completed, the particles gradually disappear
                    const cleanupInterval = setInterval(() => {
                        if (particles.length === 0) {
                            clearInterval(cleanupInterval);
                            scene.remove(particleGroup);
                            const index = particleGroups.indexOf(particleGroup);
                            if (index > -1) {
                                particleGroups.splice(index, 1);
                            }
                        }
                        updateParticles(Date.now());
                    }, 100);
                }
            }

            // Create particles
            function createParticle(position, direction, birthTime, baseColor) {
                // Particle size changes randomly
                const size = 0.05 + Math.random() * 0.1;
                const geometry = new THREE.SphereGeometry(size, 8, 8);

                // Add some random variations based on the base color
                const hsl = new THREE.Color(baseColor).getHSL({});
                const newColor = new THREE.Color().setHSL(
                    hsl.h + (Math.random() * 0.1 - 0.05), // Tone fine-tuning
                    hsl.s * (0.8 + Math.random() * 0.4), // Saturation changes
                    hsl.l * (0.8 + Math.random() * 0.4)  // brightness change
                );

                const material = new THREE.MeshBasicMaterial({
                    color: newColor,
                    transparent: true,
                    opacity: 0.7 + Math.random() * 0.3
                });

                const particle = new THREE.Mesh(geometry, material);

                // Position fine-tuning, random position near the sphere
                const offset = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.1,
                    (Math.random() - 0.5) * 0.1,
                    (Math.random() - 0.5) * 0.1
                );
                particle.position.copy(position).add(offset);

                // Add a reverse offset to generate particles from behind the sphere, creating a trailing effect
                const backOffset = new THREE.Vector3().copy(direction).multiplyScalar(-0.1 - Math.random() * 0.2);
                particle.position.add(backOffset);

                // particle data
                particle.userData = {
                    birthTime: birthTime,
                    lifespan: particleLifespan * (0.8 + Math.random() * 0.4), // Random life
                    initialScale: particle.scale.x,
                    velocity: new THREE.Vector3(
                        // The velocity direction is based on the direction the sphere is moving, but with a random offset
                        direction.x * (-0.3 - Math.random() * 0.3) + (Math.random() - 0.5) * 0.02,
                        direction.y * (-0.3 - Math.random() * 0.3) + (Math.random() - 0.5) * 0.02,
                        direction.z * (-0.3 - Math.random() * 0.3) + (Math.random() - 0.5) * 0.02
                    )
                };

                particleGroup.add(particle);
                particles.push(particle);
            }

            // Update all particles
            function updateParticles(currentTime) {
                const particlesToRemove = [];

                particles.forEach(particle => {
                    const age = currentTime - particle.userData.birthTime;

                    if (age > particle.userData.lifespan) {
                        particlesToRemove.push(particle);
                    } else {
                        // Calculate lifetime percentage (0-1)
                        const lifeProgress = age / particle.userData.lifespan;

                        // Update transparency - lower at the beginning and end, higher in the middle
                        const opacityFactor = Math.sin(lifeProgress * Math.PI);
                        particle.material.opacity = opacityFactor * 0.7;

                        // Update size - progressively smaller
                        const scaleFactor = 1 - lifeProgress * 0.9;
                        particle.scale.set(
                            particle.userData.initialScale * scaleFactor,
                            particle.userData.initialScale * scaleFactor,
                            particle.userData.initialScale * scaleFactor
                        );

                        // Update location - based on speed
                        particle.position.add(particle.userData.velocity);

                        // gradually slows down
                        particle.userData.velocity.multiplyScalar(0.95);
                    }
                });

                // Remove expired particles
                particlesToRemove.forEach(particle => {
                    particleGroup.remove(particle);
                    const index = particles.indexOf(particle);
                    if (index > -1) {
                        particles.splice(index, 1);
                    }
                });
            }

            // Start animation
            requestAnimationFrame(animateBall);

            return ball;
        }

        // Create cinematic glitter effects - special effects for connecting wires
        function createConnectionEffect(start, end, color, duration = 2000) {
            // direction vector from start point to end point
            const direction = new THREE.Vector3().subVectors(end, start).normalize();

            // Create a set of glitter particles
            const flashCount = Math.floor(10 + Math.random() * 5);
            const flashGroup = new THREE.Group();
            scene.add(flashGroup);

            // control variables
            const startTime = Date.now();
            const flashes = [];

            // Create a glitter effect
            for (let i = 0; i < flashCount; i++) {
                // Determine the flash's position on the path (0-1)
                const positionOnPath = Math.random();

                // Flash appearance time (ms)
                const appearTime = startTime + positionOnPath * duration * 0.9;

                // Flash shapes - use sprites to always face the camera
                const flashMaterial = new THREE.SpriteMaterial({
                    color: color,
                    transparent: true,
                    opacity: 0,
                    blending: THREE.AdditiveBlending
                });

                const flash = new THREE.Sprite(flashMaterial);
                flash.scale.set(0.3, 0.3, 1);

                // Calculate flash position
                const flashPosition = new THREE.Vector3().lerpVectors(start, end, positionOnPath);
                // Add a little random offset
                const offset = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.1,
                    (Math.random() - 0.5) * 0.1,
                    (Math.random() - 0.5) * 0.1
                );
                flashPosition.add(offset);
                flash.position.copy(flashPosition);

                // Store flash data
                flash.userData = {
                    appearTime: appearTime,
                    duration: 200 + Math.random() * 300, // Flash duration 200-500ms
                    maxOpacity: 0.6 + Math.random() * 0.4,
                    maxScale: 0.2 + Math.random() * 0.3
                };

                flashGroup.add(flash);
                flashes.push(flash);

                // Create a repeating flash delayed by 0.1 seconds to enhance the halo effect
                const delayedFlashMaterial = new THREE.SpriteMaterial({
                    color: color,
                    transparent: true,
                    opacity: 0,
                    blending: THREE.AdditiveBlending
                });

                const delayedFlash = new THREE.Sprite(delayedFlashMaterial);
                delayedFlash.scale.set(0.3, 0.3, 1);
                delayedFlash.position.copy(flashPosition);

                // Store delayed flash data
                delayedFlash.userData = {
                    appearTime: appearTime + 50, // Delay 0.1 seconds
                    duration: 200 + Math.random() * 300,
                    maxOpacity: 0.4 + Math.random() * 0.3, // slightly lower opacity
                    maxScale: 0.25 + Math.random() * 0.35 // slightly larger size
                };

                flashGroup.add(delayedFlash);
                flashes.push(delayedFlash);
            }

            // animation function
            function animateFlashes() {
                const currentTime = Date.now();
                const elapsed = currentTime - startTime;

                // Update all flash
                flashes.forEach(flash => {
                    const flashAge = currentTime - flash.userData.appearTime;

                    if (flashAge > 0 && flashAge < flash.userData.duration) {
                        // Flash is active
                        const progress = flashAge / flash.userData.duration;

                        // Flash brightness changes - light up quickly, dim down slowly
                        let opacity;
                        if (progress < 0.2) {
                            // light up quickly
                            opacity = (progress / 0.2) * flash.userData.maxOpacity;
                        } else {
                            // slowly darken
                            opacity = flash.userData.maxOpacity * (1 - ((progress - 0.2) / 0.8));
                        }
                        flash.material.opacity = opacity;

                        // Flash size changes
                        const scale = flash.userData.maxScale * (1 + Math.sin(progress * Math.PI) * 0.5);
                        flash.scale.set(scale, scale, 1);
                    } else if (flashAge >= flash.userData.duration) {
                        // Flash ends and becomes invisible
                        flash.material.opacity = 0;
                    }
                });

                // Continue animation or clean
                if (elapsed < duration + 700) { // Extra 700ms to ensure all flashes are completed
                    requestAnimationFrame(animateFlashes);
                } else {
                    // Animation ends, clean up
                    scene.remove(flashGroup);
                }
            }

            // Start animation
            animateFlashes();

            return flashGroup;
        }

        // fade in object
        function fadeInObject(obj, duration, callback) {
            if (!obj.material) return;

            const startTime = Date.now();
            const startOpacity = obj.material.opacity;
            const targetOpacity = 1.0;

            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);

                // Use the easing function
                const easeProgress = easeInOutQuad(progress);

                // Update transparency
                obj.material.opacity = startOpacity + (targetOpacity - startOpacity) * easeProgress;

                // If there are sub-objects (like labels), show them too
                if (obj.children.length > 0) {
                    obj.children[0].visible = true;
                }

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else if (callback) {
                    callback();
                }
            }

            animate();
        }

        // fade object
        function fadeOutObject(obj, duration, callback) {
            if (!obj.material) return;

            const startTime = Date.now();
            const startOpacity = obj.material.opacity;
            const targetOpacity = 0.0;

            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);

                // Use the easing function
                const easeProgress = easeInOutQuad(progress);

                // Update transparency
                obj.material.opacity = startOpacity + (targetOpacity - startOpacity) * easeProgress;

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else if (callback) {
                    callback();
                }
            }

            animate();
        }

        // Fade in DOM element
        function fadeInElement(element, duration, callback) {
            const startTime = Date.now();
            const startOpacity = parseFloat(element.style.opacity) || 0;
            const targetOpacity = 1.0;

            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);

                // Use the easing function
                const easeProgress = easeInOutQuad(progress);

                // Update transparency
                element.style.opacity = startOpacity + (targetOpacity - startOpacity) * easeProgress;

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else if (callback) {
                    callback();
                }
            }

            animate();
        }

        // Quadratic easing function
        function easeInOutQuad(t) {
            return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        }
