        // Modify the label creation part in the createAnimatedConnection function
        function createAnimatedConnection(obj1, obj2, text, dashed = false, isSecondLabel = false, color = 0xffffff, lineWidth = 1, animStepId = null) {
            const points = [];
            points.push(obj1.position.clone());
            points.push(obj2.position.clone());

            const lineGeometry = new THREE.BufferGeometry().setFromPoints(points);
            let lineMaterial;

            if (dashed) {
                lineMaterial = new THREE.LineDashedMaterial({
                    color: color,
                    dashSize: 0.3,
                    gapSize: 0.1,
                    transparent: true,
                    opacity: 0,
                    linewidth: lineWidth // Note: linewidth may not work in WebGL
                });
            } else {
                lineMaterial = new THREE.LineBasicMaterial({
                    color: color,
                    transparent: true,
                    opacity: 0,
                    linewidth: lineWidth // Note: linewidth may not work in WebGL
                });
            }

            const line = new THREE.Line(lineGeometry, lineMaterial);

            if (dashed) {
                line.computeLineDistances();
            }

            scene.add(line); // Add to the global connections array to ensure it will not be cleared

            // Calculate midpoint
            const midPoint = new THREE.Vector3().addVectors(
                obj1.position,
                obj2.position
            ).multiplyScalar(0.5);

            // To avoid overlapping labels, calculate the offset of the label position
            let labelOffset = new THREE.Vector3(0, 0, 0);
            const direction = new THREE.Vector3().subVectors(obj2.position, obj1.position).normalize();
            // Calculate vectors perpendicular to the direction of the connecting line - ensuring it is still visible in 3D space
            const upVector = new THREE.Vector3(0, 1, 0);
            const perpendicular = new THREE.Vector3().crossVectors(direction, upVector).normalize();

            // If it is the second label, place it below the line and increase the offset
            if (isSecondLabel) {
                labelOffset.addScaledVector(perpendicular, -1.2); // Offset downward, increase offset
                labelOffset.y -= 0.5; // Additional Y-axis offset to ensure separation in 3D space
            } else {
                labelOffset.addScaledVector(perpendicular, 1.2); // Offset up, increase offset
                labelOffset.y += 0.5; // Additional Y-axis offset to ensure separation in 3D space
            }

            // Tags are added but initially hidden
            const label = createTextLabel(text,
                midPoint.x + labelOffset.x,
                midPoint.y + labelOffset.y,
                midPoint.z + labelOffset.z,
                currentStep); // Pass the current step ID

            // If you are at step 7 and an animation step ID is provided, set the animation step ID for the label
            if (currentStep === 6 && animStepId !== null && label.element) {
                console.log("Set animation step ID for connector line labels:", animStepId, "Tag content:", text);
                label.element.dataset.animStepId = animStepId;
            }

            if (label.element) {
                label.element.style.opacity = 0;
            }

            // Create a pipe instead of a simple line to make it more visible in 3D space
            const tubeGeometry = new THREE.TubeGeometry(
                new THREE.CatmullRomCurve3([obj1.position.clone(), midPoint.clone(), obj2.position.clone()]),
                16, // Number of pipe segments
                0.05, // Pipe radius
                8, // Pipe circumference segment number
                false // Is it closed:
            );

            const tubeMaterial = new THREE.MeshPhongMaterial({
                color: color,
                transparent: true,
                opacity: 0,
                shininess: 30
            });

            const tube = new THREE.Mesh(tubeGeometry, tubeMaterial);
            scene.add(tube);
            objects.push(tube);

            // Add arrow
            const arrowLength = 0.4;
            const angle = Math.atan2(
                obj2.position.y - obj1.position.y,
                Math.sqrt(Math.pow(obj2.position.x - obj1.position.x, 2) + Math.pow(obj2.position.z - obj1.position.z, 2))
            );

            // Arrow position - a point before the end point, calculated in 3D space
            const arrowDir = new THREE.Vector3().subVectors(obj2.position, obj1.position).normalize();
            const arrowPos = new THREE.Vector3().copy(obj2.position).sub(arrowDir.multiplyScalar(arrowLength));

            const arrowGeometry = new THREE.ConeGeometry(0.2, 0.4, 8);
            const arrowMaterial = new THREE.MeshPhongMaterial({
                color: color,
                transparent: true,
                opacity: 0
            });

            const arrow = new THREE.Mesh(arrowGeometry, arrowMaterial);
            arrow.position.copy(arrowPos);

            // Calculate the rotation of the arrow so that it points to the target object
            const arrowQuaternion = new THREE.Quaternion();
            const arrowDirection = new THREE.Vector3().subVectors(obj2.position, obj1.position).normalize();
            const arrowUp = new THREE.Vector3(0, 1, 0);
            const arrowMatrix = new THREE.Matrix4().lookAt(obj1.position, obj2.position, arrowUp);
            arrowQuaternion.setFromRotationMatrix(arrowMatrix);
            arrow.quaternion.copy(arrowQuaternion);
            arrow.rotateX(Math.PI / 2); // Adjust arrow direction

            scene.add(arrow);
            objects.push(arrow);

            // Create a fade-in animation
            fadeInObject(line, 1000);
            fadeInObject(tube, 1000);
            fadeInObject(arrow, 1000);

            // label fade in
            if (label.element) {
                fadeInElement(label.element, 1000, () => {
                    // Set initial state to fully opaque
                    label.element.style.opacity = '1';
                    // Changes to 33% opacity after 2 seconds
                    setTimeout(() => {
                        label.element.style.opacity = '0.33';
                    }, 2000);
                });
            }

            return { line, tube, label, arrow };
        }

        // clear scene
        function clearScene() {
            // Clear objects
            objects.forEach(obj => scene.remove(obj));
            objects.length = 0;

            // Clear connection line
            connections.forEach(line => scene.remove(line));
            connections.length = 0;

            // Clear Tag - Make sure it is removed from the scene
            labels.forEach(label => {
                if(label.parent) {
                    label.parent.remove(label);
                } else {
                    scene.remove(label);
                }
            });
            labels.length = 0;

            // Remove replay button if present
            const replayBtn = document.getElementById('replay-btn');
            if (replayBtn) {
                replayBtn.parentNode.removeChild(replayBtn);
            }

            // Remove the animation control panel (if present)
            const animationControls = document.getElementById('animation-controls');
            if (animationControls) {
                animationControls.parentNode.removeChild(animationControls);
            }
        }

        // animation loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        // Start presentation
        function startDemo() {
            currentStep = 0;
            steps[currentStep]();

            document.getElementById('start-btn').disabled = true;
            document.getElementById('prev-btn').disabled = true;
            document.getElementById('next-btn').disabled = false;

            // Initialize progress bar step mark
            initProgressMarkers();

            // Add camera rotation animation
            animateCameraRotation(25, 1000);
        }

        // Camera rotation animation
        function animateCameraRotation(angleInDegrees = 30, duration = 1500) {
            // Save initial state
            const startPosition = camera.position.clone();
            const startTarget = controls.target.clone();

            // Calculate rotation angle (radians)
            const angleInRadians = angleInDegrees * (Math.PI / 180);

            // Calculate target position
            const radius = startPosition.distanceTo(startTarget);
            const startAngle = Math.atan2(startPosition.x - startTarget.x, startPosition.z - startTarget.z);
            const endAngle = startAngle + angleInRadians;

            // Set animation parameters
            let startTime = null;

            function animateRotation(timestamp) {
                if (!startTime) startTime = timestamp;
                const elapsed = timestamp - startTime;
                const progress = Math.min(elapsed / duration, 1);

                // Use the easing function
                const easeProgress = easeInOutCubic(progress);

                // Calculate current angle
                const currentAngle = startAngle + (endAngle - startAngle) * easeProgress;

                // Update camera position
                const newX = startTarget.x + radius * Math.sin(currentAngle);
                const newZ = startTarget.z + radius * Math.cos(currentAngle);

                camera.position.set(newX, startPosition.y, newZ);

                // Make sure the camera is always looking towards the target point
                camera.lookAt(startTarget);
                controls.update();

                // Continue animation until complete
                if (progress < 1) {
                    requestAnimationFrame(animateRotation);
                }
            }

            // Start animation
            requestAnimationFrame(animateRotation);
        }

        // Easing function
        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        // reset demo
        function resetDemo() {
            clearScene();
            currentStep = -1;

            // Reset label array
            currentStepLabels = [];
            allLabels = [];

            // Reset camera to default position
            camera.position.set(0, 0, 20);
            controls.target.set(0, 0, 0);
            controls.update();

            document.getElementById('start-btn').disabled = false;
            document.getElementById('prev-btn').disabled = true;
            document.getElementById('next-btn').disabled = true;
            document.getElementById('step-description').textContent =
                'Welcome to MCP model visualization! Click the "Start" button to start the demonstration.';
            document.getElementById('step-title').textContent = "";

            // Hide progress bar
            const progressContainer = document.getElementById('progress-container');
            progressContainer.style.display = 'none';
        }

        // Initialized after the page is loaded
        window.onload = init;

        // Initialize progress bar step mark
        function initProgressMarkers() {
            const progressBar = document.getElementById('progress-bar');
            const totalSteps = steps.length;

            // Clear existing tags
            const existingMarkers = document.querySelectorAll('.step-marker');
            existingMarkers.forEach(marker => marker.remove());

            // Add step markers
            for (let i = 0; i < totalSteps; i++) {
                const marker = document.createElement('div');
                marker.className = 'step-marker';
                marker.dataset.step = i;
                const position = (i / (totalSteps - 1)) * 100;
                marker.style.left = `${position}%`;
                progressBar.appendChild(marker);
            }

            updateProgressBar(0);
        }

        // Update progress bar position
        function updateProgressBar(stepIndex) {
            const totalSteps = steps.length;
            const progress = (stepIndex / (totalSteps - 1)) * 100;

            const progressFill = document.getElementById('progress-fill');
            const progressHandle = document.getElementById('progress-handle');

            progressFill.style.width = `${progress}%`;
            progressHandle.style.left = `${progress}%`;
        }

        // Jump to specified step
        function jumpToStep(stepIndex) {
            if (stepIndex >= 0 && stepIndex < steps.length) {
                // Clear the current step label array
                currentStepLabels = [];

                currentStep = stepIndex;
                steps[currentStep]();

                // Update button state
                document.getElementById('prev-btn').disabled = (currentStep === 0);
                document.getElementById('next-btn').disabled = (currentStep === steps.length - 1);

                // Update progress bar
                updateProgressBar(currentStep);

                // Delay updating transparency of all labels
                setTimeout(updateAllLabelsOpacity, 100);
            }
        }

        // Progress bar drag function
        function setupProgressDrag() {
            const progressBar = document.getElementById('progress-bar');
            const progressHandle = document.getElementById('progress-handle');
            let isDragging = false;

            // Mouse/touch press events
            progressHandle.addEventListener('mousedown', startDrag);
            progressHandle.addEventListener('touchstart', startDrag);

            // Mouse/touch movement events
            document.addEventListener('mousemove', drag);
            document.addEventListener('touchmove', drag);

            // Mouse/touch release events
            document.addEventListener('mouseup', endDrag);
            document.addEventListener('touchend', endDrag);

            // Click on the progress bar to jump
            progressBar.addEventListener('click', jumpToPosition);

            function startDrag(e) {
                e.preventDefault();
                isDragging = true;

                // If there is autoplay, stop it
                pausePlayback();
            }

            function drag(e) {
                if (!isDragging) return;
                e.preventDefault();

                const rect = progressBar.getBoundingClientRect();
                let clientX;

                if (e.type === 'touchmove') {
                    clientX = e.touches[0].clientX;
                } else {
                    clientX = e.clientX;
                }

                // Calculate relative position (0-1 range)
                let position = (clientX - rect.left) / rect.width;
                position = Math.max(0, Math.min(1, position));

                // Update progress bar position
                const progressFill = document.getElementById('progress-fill');
                progressFill.style.width = `${position * 100}%`;
                progressHandle.style.left = `${position * 100}%`;
            }

            function endDrag(e) {
                if (!isDragging) return;

                const rect = progressBar.getBoundingClientRect();
                let clientX;

                if (e.type === 'touchend') {
                    clientX = e.changedTouches[0].clientX;
                } else {
                    clientX = e.clientX;
                }

                // Calculate relative position (0-1 range)
                let position = (clientX - rect.left) / rect.width;
                position = Math.max(0, Math.min(1, position));

                // Calculate the corresponding step index
                const totalSteps = steps.length;
                const stepIndex = Math.round(position * (totalSteps - 1));

                // Jump to the appropriate step
                jumpToStep(stepIndex);

                isDragging = false;
            }

            function jumpToPosition(e) {
                const rect = progressBar.getBoundingClientRect();
                let position = (e.clientX - rect.left) / rect.width;
                position = Math.max(0, Math.min(1, position));

                // Calculate the corresponding step index
                const totalSteps = steps.length;
                const stepIndex = Math.round(position * (totalSteps - 1));

                // Update progress bar position
                const progressFill = document.getElementById('progress-fill');
                progressFill.style.width = `${position * 100}%`;
                progressHandle.style.left = `${position * 100}%`;

                // Jump to the appropriate step
                jumpToStep(stepIndex);

                // If there is autoplay, stop it
                pausePlayback();
            }
        }

        // Set playback controls
        let playInterval = null; // Global variables for easy control

        function setupPlaybackControls() {
            const playBtn = document.getElementById('play-btn');
            const pauseBtn = document.getElementById('pause-btn');

            // play button event
            playBtn.addEventListener('click', function() {
                startPlayback();
            });

            // pause button event
            pauseBtn.addEventListener('click', function() {
                pausePlayback();
            });
        }

        // Start autoplay
        function startPlayback() {
            // Stop existing playback interval
            pausePlayback();

            if (currentStep < steps.length - 1) {
                // Set new playback interval
                playInterval = setInterval(function() {
                    if (currentStep < steps.length - 1) {
                        nextStep();

                        // Update progress bar
                        updateProgressBar(currentStep);
                    } else {
                        pausePlayback();
                    }
                }, 3000); // Play one step every 3 seconds
            }
        }

        // Pause autoplay
        function pausePlayback() {
            if (playInterval) {
                clearInterval(playInterval);
                playInterval = null;
            }
        }

        // Add a pulse effect function in the animation function area
        // Create a pulse effect (used to indicate user input or server startup)
        function createPulsingEffect(targetObject, color) {
            // Create a ring geometry
            const ringGeometry = new THREE.RingGeometry(1, 1.2, 32);
            const ringMaterial = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.7,
                side: THREE.DoubleSide
            });

            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.position.copy(targetObject.position);
            ring.position.x -= 1.5; // Slightly offset to represent input from the user
            ring.position.y += 1.5;
            // Rotate the ring perpendicular to the line connected to the target object
            const direction = new THREE.Vector3().subVectors(targetObject.position, ring.position).normalize();
            // Create a rotation quaternion so that the ring is perpendicular to the direction vector
            const quaternion = new THREE.Quaternion();
            // The default ring is on the XY plane and needs to be rotated to make its normal line consistent with the direction of the connection.
            // First calculate the rotation from the z-axis (the default normal of the ring) to the target direction
            const upVector = new THREE.Vector3(0, 0, 1);
            const axis = new THREE.Vector3().crossVectors(upVector, direction).normalize();
            const angle = Math.acos(upVector.dot(direction));
            quaternion.setFromAxisAngle(axis, angle);
            ring.quaternion.copy(quaternion);

            scene.add(ring);

            // Create a delayed second ring
            const ringDelayed = new THREE.Mesh(ringGeometry.clone(), ringMaterial.clone());
            ringDelayed.position.copy(ring.position);
            ringDelayed.quaternion.copy(ring.quaternion);
            ringDelayed.material.opacity = 0.5; // Slightly lower transparency
            scene.add(ringDelayed);

            // Set animation
            const startTime = Date.now();
            const duration = 2000; // 2 seconds a cycle

            function animatePulse() {
                const currentTime = Date.now();
                const elapsedTime = (currentTime - startTime) % duration;
                const progress = elapsedTime / duration;

                // Main Ring Pulse Effect - Scale and Transparency
                const scale = 1 + 0.5 * Math.sin(progress * Math.PI * 2);
                ring.scale.set(scale, scale, 1);
                ring.material.opacity = 0.7 * (1 - progress);

                // Animation of delay loop - using 0.1 second delay
                const delayedProgress = ((currentTime - startTime - 100) % duration) / duration;
                if (delayedProgress >= 0) {
                    const delayedScale = 1 + 0.6 * Math.sin(delayedProgress * Math.PI * 2);
                    ringDelayed.scale.set(delayedScale, delayedScale, 1);
                    ringDelayed.material.opacity = 0.5 * (1 - delayedProgress);
                }

                requestAnimationFrame(animatePulse);
            }

            // Start animation
            requestAnimationFrame(animatePulse);

            // Return to the main ring so it can be added to the dataBalls array
            return ring;
        }

        // Create connecting lines
        function createConnection(obj1, obj2, color = 0xaaaaaa, dashed = false) {
            const points = [];
            points.push(obj1.position.clone());
            points.push(obj2.position.clone());

            const lineGeometry = new THREE.BufferGeometry().setFromPoints(points);
            let lineMaterial;

            if (dashed) {
                lineMaterial = new THREE.LineDashedMaterial({
                    color: color,
                    dashSize: 0.3,
                    gapSize: 0.1
                });
            } else {
                lineMaterial = new THREE.LineBasicMaterial({ color: color });
            }

            const line = new THREE.Line(lineGeometry, lineMaterial);

            if (dashed) {
                line.computeLineDistances();
            }

            scene.add(line);
            connections.push(line);
            return line;
        }

        // Add a function that smoothly scales objects
        function animateScale(obj, targetScale, duration = 1000, callback) {
            const startScale = obj.scale.clone();
            const startTime = Date.now();

            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);

                // Use easing functions to make animations more natural
                const easeProgress = easeInOutQuad(progress);

                // Calculate current zoom
                obj.scale.lerpVectors(startScale, targetScale, easeProgress);

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else if (callback) {
                    callback();
                }
            }

            animate();
        }
    </script>
