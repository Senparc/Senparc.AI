# ASP.NET Core (.NET Framework)
# Build and test ASP.NET Core projects targeting the full .NET Framework.
# Add steps that publish symbols, save build artifacts, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/dotnet-core

trigger:
  - master

# 🎯 Use a self-hosted agent pool to speed up CI/CD (shares the same Agent Pool and variable group with NcfPackageSources)
pool:
  name: 'SenparcOpenSource'
  demands:
    - Agent.OS -equals Windows_NT

variables:
  - group: Nuget_Key   # Library variable group containing NUGET_API_KEY (shared with NcfPackageSources)
  - name: solution
    value: '**/Senparc.AI.sln'
  - name: buildPlatform
    value: 'Any CPU'
  - name: buildConfiguration
    value: 'Release'
  - name: NUGET_PACKAGES
    value: '$(Agent.ToolsDirectory)/nuget/packages'
  - name: NuGetPushSource
    value: 'https://api.nuget.org/v3/index.json'

steps:
# ✅ Pin the .NET SDK version (the solution contains netstandard2.1, net8.0, and net10.0 projects; SDK 10 can compile all TFMs)
- task: UseDotNet@2
  displayName: 'Use .NET SDK 10'
  inputs:
    version: '10.0.x'
    packageType: 'sdk'
    performMultiLevelLookup: true
    includePreviewVersions: true

- task: UseDotNet@2
  displayName: 'Use .NET SDK 8'
  inputs:
    version: '8.x'
    packageType: 'sdk'
    performMultiLevelLookup: true
    includePreviewVersions: true

- script: |
    echo "=== Installed SDKs ==="
    dotnet --list-sdks
    echo "=== Active SDK (global.json) ==="
    dotnet --version
    dotnet --list-sdks | findstr /R /C:"10\." >nul || (echo ##[error].NET 10 SDK is not installed, so net10.0 projects cannot be compiled. Check the UseDotNet task or agent network. && exit 1)
  displayName: 'Verify .NET 10 SDK'

# 🟢 Cache NuGet and dependencies
- task: Cache@2
  inputs:
    key: 'nuget | "$(Agent.OS)" | **/*.csproj'
    path: '$(NUGET_PACKAGES)'
    restoreKeys: 'nuget'
  displayName: 'Cache NuGet Packages'

# 🟢 Cache Aspire Workload
- task: Cache@2
  inputs:
    key: 'aspire-workload | "$(Agent.OS)"'
    path: '~/.dotnet'
    restoreKeys: 'aspire-workload'
  displayName: 'Cache Aspire Workload'

# 🟢 Cache NuGet tools to reduce installation time
- task: Cache@2
  inputs:
    key: 'nuget-tool | "$(Agent.OS)"'
    path: 'C:\ProgramData\nuget'
    restoreKeys: 'nuget-tool'
  displayName: 'Cache NuGet Tool'

# ✅ Install Aspire Workload only when the cache misses
- script: |
    dotnet workload list | findstr /C:"aspire" || dotnet workload install aspire
  displayName: 'Check & Install Aspire Workload'
  condition: ne(variables['CACHE_RESTORED'], 'true')

# ✅ Use the cached NuGet version to avoid repeated installation
- task: NuGetToolInstaller@1
  displayName: 'Use Cached NuGet 6.3.0'
  inputs:
    versionSpec: '6.3.0'

- script: |
    nuget sources remove -name nuget.org
  displayName: 'Remove Existing NuGet Source'
- script: |
    dotnet nuget add source https://api.nuget.org/v3/index.json -n nuget.org
  displayName: 'Add NuGet Source'

# ✅ Restore NuGet dependencies (dotnet restore uses SDK 10 from global.json and avoids nuget.exe + MSBuild accidentally using SDK 8)
- task: DotNetCoreCLI@2
  displayName: 'dotnet restore'
  inputs:
    command: restore
    projects: '**/Senparc.AI.sln'
    arguments: '--verbosity detailed'

- task: DotNetCoreCLI@2
  displayName: Build
  inputs:
    command: build
    projects: '**/Senparc.AI.sln'
    arguments: '--configuration Release --no-restore'
  continueOnError: true

# Automatically discover and push Senparc.AI.* .nupkg / .snupkg packages (--skip-duplicate)
# Credentials: injected through the secret variable NUGET_API_KEY in the Library variable group Nuget_Key
- powershell: |
    $ErrorActionPreference = 'Continue'
    $root = "$(Build.SourcesDirectory)"
    $source = "$(NuGetPushSource)"
    $apiKey = $env:NUGET_API_KEY
    if ([string]::IsNullOrWhiteSpace($apiKey)) {
      Write-Host "##[error]Missing secret variable NUGET_API_KEY. Set it in the Library variable group Nuget_Key (variable name must be NUGET_API_KEY and secret must be enabled)."
      exit 2
    }

    Add-Type -AssemblyName System.IO.Compression.FileSystem

    function Get-NupkgMetadataFromZip {
      param([string]$PackagePath)
      try {
        $zip = [System.IO.Compression.ZipFile]::OpenRead($PackagePath)
        try {
          $entry = $zip.Entries | Where-Object { $_.FullName -match '(?i)\.nuspec$' } | Select-Object -First 1
          if (-not $entry) {
            return @{ Id = ''; Version = '' }
          }
          $r = New-Object System.IO.StreamReader($entry.Open())
          try {
            $txt = $r.ReadToEnd()
          } finally { $r.Close() }
          $xml = New-Object System.Xml.XmlDocument
          $xml.PreserveWhitespace = $true
          $xml.LoadXml($txt)
          $nsUri = $xml.DocumentElement.NamespaceURI
          $id = $null
          $ver = $null
          if ([string]::IsNullOrEmpty($nsUri)) {
            $id = $xml.package.metadata.id
            $ver = $xml.package.metadata.version
          } else {
            $nsm = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
            $nsm.AddNamespace('n', $nsUri)
            $meta = $xml.SelectSingleNode('//n:metadata', $nsm)
            if ($meta) {
              $idN = $meta.SelectSingleNode('n:id', $nsm)
              $verN = $meta.SelectSingleNode('n:version', $nsm)
              if ($idN) { $id = $idN.InnerText }
              if ($verN) { $ver = $verN.InnerText }
            }
          }
          return @{ Id = [string]$id; Version = [string]$ver }
        } finally { $zip.Dispose() }
      } catch {
        return @{ Id = ''; Version = '' }
      }
    }

    function Test-SenparcAiPackageFileName {
      param([string]$FileName)
      return $FileName.StartsWith('Senparc.AI.', [System.StringComparison]::Ordinal)
    }

    function Get-PackageDisplayName {
      param([string]$PackagePath)
      $meta = Get-NupkgMetadataFromZip $PackagePath
      if (-not [string]::IsNullOrWhiteSpace($meta.Id)) {
        return $meta.Id
      }
      return [System.IO.Path]::GetFileNameWithoutExtension($PackagePath)
    }

    function Push-PackageFile {
      param(
        [string]$PackagePath,
        [string]$PackageKind
      )

      $pkgId = Get-PackageDisplayName $PackagePath
      $meta = Get-NupkgMetadataFromZip $PackagePath
      $pkgVer = if ([string]::IsNullOrWhiteSpace($meta.Version)) { '' } else { $meta.Version }

      Write-Host ("##[command] dotnet nuget push ""{0}"" --source ""{1}"" --api-key *** --skip-duplicate ({2})" -f $PackagePath, $source, $PackageKind)

      $stdoutPath = Join-Path $env:TEMP ("nuget-push-{0}.out.txt" -f [Guid]::NewGuid().ToString('N'))
      $stderrPath = Join-Path $env:TEMP ("nuget-push-{0}.err.txt" -f [Guid]::NewGuid().ToString('N'))
      try {
        $p = Start-Process -FilePath 'dotnet' -ArgumentList 'nuget', 'push', $PackagePath, '--source', $source, '--api-key', $apiKey, '--skip-duplicate', '--timeout', '3600' -NoNewWindow -Wait -PassThru `
          -RedirectStandardOutput $stdoutPath -RedirectStandardError $stderrPath
        $out = (Get-Content -LiteralPath $stdoutPath -Raw -ErrorAction SilentlyContinue)
        $err = (Get-Content -LiteralPath $stderrPath -Raw -ErrorAction SilentlyContinue)
        $code = $p.ExitCode
      } finally {
        Remove-Item -LiteralPath $stdoutPath -Force -ErrorAction SilentlyContinue
        Remove-Item -LiteralPath $stderrPath -Force -ErrorAction SilentlyContinue
      }

      $combined = (@($out, $err) | Where-Object { $_ }) -join "`n"
      $result = 'Failed'
      $reason = ''

      if ($code -eq 0) {
        $lower = if ($combined) { $combined.ToLowerInvariant() } else { '' }
        if ($lower -match 'skip|already exists|duplicate|409') {
          $result = 'Skipped (exists)'
          if ($combined) {
            $one = ($combined.Trim() -replace '\s+', ' ')
            if ($one.Length -gt 200) { $reason = $one.Substring(0, 200) + '...' } else { $reason = $one }
          }
        } else {
          $result = 'Published'
        }
      } else {
        $lower = if ($combined) { $combined.ToLowerInvariant() } else { '' }
        if ($lower -match '409|conflict|already exists|duplicate|cannot publish.*exists') {
          $result = 'Skipped (exists)'
          if ($combined) {
            $one = ($combined.Trim() -replace '\s+', ' ')
            if ($one.Length -gt 200) { $reason = $one.Substring(0, 200) + '...' } else { $reason = $one }
          }
        } else {
          $script:anyUnexpectedFailure = $true
          $result = 'Failed'
          $reason = if ($combined) { ($combined.Trim() -replace '\s+', ' ') } else { ("dotnet exit code {0}" -f $code) }
          if ($reason.Length -gt 400) { $reason = $reason.Substring(0, 400) + '...' }
        }
      }

      return [pscustomobject]@{
        PackageId = $pkgId
        Version   = $pkgVer
        Kind      = $PackageKind
        Path      = $PackagePath
        Result    = $result
        Detail    = $reason
      }
    }

    $anyUnexpectedFailure = $false
    $rows = New-Object System.Collections.Generic.List[object]

    $nupkgCandidates = Get-ChildItem -Path $root -Recurse -File -Filter '*.nupkg' -ErrorAction SilentlyContinue |
      Where-Object { Test-SenparcAiPackageFileName $_.Name } |
      Sort-Object FullName -Unique

    $snupkgCandidates = Get-ChildItem -Path $root -Recurse -File -Filter '*.snupkg' -ErrorAction SilentlyContinue |
      Where-Object { Test-SenparcAiPackageFileName $_.Name } |
      Sort-Object FullName -Unique

    Write-Host "== Senparc.AI NuGet push: discovered $($nupkgCandidates.Count) .nupkg and $($snupkgCandidates.Count) .snupkg under $root =="

    foreach ($f in $nupkgCandidates) {
      $rows.Add((Push-PackageFile -PackagePath $f.FullName -PackageKind 'nupkg'))
    }

    foreach ($f in $snupkgCandidates) {
      $rows.Add((Push-PackageFile -PackagePath $f.FullName -PackageKind 'snupkg'))
    }

    Write-Host ''
    Write-Host 'Legend: ✅ Published  |  ❌ Failed  |  ⏭️ Skipped (exists)'
    Write-Host '========== NuGet push summary (PackageId | Version | Kind | Path | Result) =========='
    foreach ($r in $rows) {
      $pathDisp = $r.Path
      if ($pathDisp.Length -gt 120) { $pathDisp = '...' + $pathDisp.Substring([Math]::Max(0, $pathDisp.Length - 117)) }
      $resultDisp = switch ($r.Result) {
        'Published' { '✅ Published' }
        'Failed' { '❌ Failed' }
        'Skipped (exists)' { '⏭️ Skipped (exists)' }
        default { $r.Result }
      }
      Write-Host ('| {0} | {1} | {2} | {3} | {4} |' -f $r.PackageId, $r.Version, $r.Kind, $pathDisp, $resultDisp)
      if ($r.Detail) {
        Write-Host ('  Reason: {0}' -f $r.Detail)
      }
    }
    Write-Host '==============================================================================='
    Write-Host ('Total: {0}  (Published / Skipped / Failed see the Result column above)' -f $rows.Count)
    Write-Host 'Job exit: The discovery and push loop has finished executing; the job failed if any non-duplicate error exists.'

    if ($anyUnexpectedFailure) {
      Write-Host "##[error]One or more package pushes failed (see summary table)."
      exit 1
    }
    exit 0
  displayName: 'Push Senparc.AI .nupkg/.snupkg (auto-discover, skip duplicates)'
  condition: succeededOrFailed()
  env:
    NUGET_API_KEY: $(NUGET_API_KEY)

- task: DotNetCoreCLI@2
  displayName: Publish
  inputs:
    command: publish
    publishWebProjects: True
    arguments: '--configuration $(BuildConfiguration) --output $(build.artifactstagingdirectory)'
    zipAfterPublish: True
  enabled: false

- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact'
  inputs:
    PathtoPublish: '$(build.artifactstagingdirectory)'
  enabled: false
  condition: succeededOrFailed()
